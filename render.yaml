services:
  # ─── FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: sentiment-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: CHROMA_MODE
        value: embedded
      - key: CHROMA_PATH
        value: /tmp/chroma_data
      - key: ALLOWED_ORIGINS
        sync: false

  # ─── Celery Worker ────────────────────────────────────────────
  - type: worker
    name: sentiment-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.worker
    dockerContext: ./backend
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          name: sentiment-backend
          type: web
          envVarKey: SECRET_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_SYNC
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: CHROMA_MODE
        value: embedded
      - key: CHROMA_PATH
        value: /tmp/chroma_data
