databases:
  - name: sentiment-db
    databaseName: sentimentdb
    user: sentimentuser
    plan: free

services:
  # ─── FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: sentiment-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false           # set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: REDIS_URL
        sync: false           # paste Upstash Redis URL here
      - key: CELERY_BROKER_URL
        sync: false           # paste Upstash Redis URL here
      - key: CELERY_RESULT_BACKEND
        sync: false           # paste Upstash Redis URL here
      - key: CHROMA_MODE
        value: embedded
      - key: CHROMA_PATH
        value: /app/chroma_data
      - key: ALLOWED_ORIGINS
        sync: false           # set to your Vercel frontend URL
    disk:
      name: chroma-data
      mountPath: /app/chroma_data
      sizeGB: 1

  # ─── Celery Worker ────────────────────────────────────────────
  - type: worker
    name: sentiment-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: >
      celery -A app.tasks.celery_app worker
        --loglevel=warning
        --concurrency=2
        -Q default,nlp,alerts
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        fromService:
          name: sentiment-backend
          type: web
          envVarKey: SECRET_KEY
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: sentiment-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: CHROMA_MODE
        value: embedded
      - key: CHROMA_PATH
        value: /app/chroma_data
    disk:
      name: chroma-data-worker
      mountPath: /app/chroma_data
      sizeGB: 1
