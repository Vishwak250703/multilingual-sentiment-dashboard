name: CI / CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Backend tests
  # ─────────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sentimentuser
          POSTGRES_PASSWORD: sentimentpass
          POSTGRES_DB: sentimentdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://sentimentuser:sentimentpass@localhost:5432/sentimentdb_test
      SECRET_KEY: ci-secret-key-not-for-production-use
      ENVIRONMENT: testing
      DEBUG: "false"
      # Dummy values so Settings doesn't fail validation in CI
      POSTGRES_USER: sentimentuser
      POSTGRES_PASSWORD: sentimentpass
      POSTGRES_DB: sentimentdb_test
      POSTGRES_HOST: localhost
      REDIS_HOST: localhost
      ANTHROPIC_API_KEY: sk-ci-dummy-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v \
            --tb=short

      - name: Upload coverage report
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # Frontend type-check + build
  # ─────────────────────────────────────────────────────────────────────────────
  frontend-check:
    name: Frontend type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check
        working-directory: frontend
        run: npm run type-check || npx tsc --noEmit

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: ""
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────────
  # Docker build smoke test
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-check]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # Deploy to production (main branch only, manual approval recommended)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    environment: production   # requires manual approval in GitHub settings

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            BRANCH=main SKIP_TESTS=true bash scripts/deploy.sh
